name: Talos site staging

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: "Exact candidate commit SHA to deploy to Cloudflare Pages staging"
        required: true
        type: string
      version:
        description: "Expected talosVersion, for example 0.10.8"
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLOUDFLARE_PROJECT_NAME: taloslocal
  CLOUDFLARE_STAGING_BRANCH: site-staging
  EXPECTED_PREVIEW_URL: https://site-staging.taloslocal.pages.dev

concurrency:
  group: site-staging-${{ github.workflow }}-${{ inputs.target_sha }}
  cancel-in-progress: false

jobs:
  cloudflare-pages-staging:
    name: Cloudflare Pages staging deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout requested candidate
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target_sha }}
          fetch-depth: 0

      - name: Verify requested commit and version
        shell: bash
        run: |
          actual_sha="$(git rev-parse HEAD)"
          if [[ "$actual_sha" != "${{ inputs.target_sha }}" ]]; then
            echo "Checked out SHA $actual_sha does not match requested SHA ${{ inputs.target_sha }}"
            exit 1
          fi

          version_line="$(grep -E '^talosVersion=' gradle.properties)"
          if [[ "$version_line" != "talosVersion=${{ inputs.version }}" ]]; then
            echo "gradle.properties has '$version_line', expected talosVersion=${{ inputs.version }}"
            exit 1
          fi

          changelog_heading="## [${{ inputs.version }}]"
          if ! grep -Fq "$changelog_heading" CHANGELOG.md; then
            echo "CHANGELOG.md does not contain $changelog_heading"
            exit 1
          fi

      - name: Set up Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Build and guard site
        shell: bash
        run: |
          npm ci --prefix site
          npm test --prefix site
          npm run build --prefix site
          npm run test:deploy-surface --prefix site

      - name: Verify Cloudflare staging credentials and target
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            echo "CLOUDFLARE_API_TOKEN secret is required for site staging deploy"
            exit 1
          fi
          if [[ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            echo "CLOUDFLARE_ACCOUNT_ID repository variable is required for site staging deploy"
            exit 1
          fi
          if [[ "$CLOUDFLARE_PROJECT_NAME" != "taloslocal" ]]; then
            echo "Unexpected Cloudflare project: $CLOUDFLARE_PROJECT_NAME"
            exit 1
          fi
          if [[ "$CLOUDFLARE_STAGING_BRANCH" != "site-staging" ]]; then
            echo "Unexpected Cloudflare staging branch: $CLOUDFLARE_STAGING_BRANCH"
            exit 1
          fi
          echo "Expected staging preview: $EXPECTED_PREVIEW_URL"

      - name: Deploy Cloudflare Pages staging preview
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4 pages deploy site/dist --project-name=taloslocal --branch=site-staging --commit-dirty=true
          echo "Expected staging preview: $EXPECTED_PREVIEW_URL"

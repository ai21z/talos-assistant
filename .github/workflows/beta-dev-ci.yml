name: Beta Dev CI

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [v0.9.0-beta-dev]
  push:
    branches:
      - v0.9.0-beta-dev

permissions:
  contents: read

concurrency:
  group: beta-dev-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gradle-check:
    name: Gradle check (Java 21)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Run E2E tests
        run: ./gradlew e2eTest --no-daemon

      - name: Run coverage and artifact gates
        run: ./gradlew jacocoTestReport checkGeneratedArtifactCanaries jacocoTestCoverageVerification --no-daemon

      - name: Run final Gradle check
        run: ./gradlew check --no-daemon

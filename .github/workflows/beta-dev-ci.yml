name: Beta Dev CI

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [v0.9.0-beta-dev]
  push:
    branches:
      - v0.9.0-beta-dev

permissions:
  contents: read

concurrency:
  group: beta-dev-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gradle-check:
    name: Gradle check (Java 21)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Run E2E tests
        run: ./gradlew e2eTest --no-daemon

      - name: Run coverage and artifact gates
        run: ./gradlew jacocoTestReport checkGeneratedArtifactCanaries jacocoTestCoverageVerification --no-daemon

      - name: Run final Gradle check
        run: ./gradlew check --no-daemon

      - name: Report test result failures
        if: failure()
        shell: bash
        run: |
          python3 - <<'PY'
          import glob
          import os
          import xml.etree.ElementTree as ET

          def escape(value):
              return str(value).replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")

          found = False
          for path in glob.glob("build/test-results/**/*.xml", recursive=True):
              try:
                  root = ET.parse(path).getroot()
              except ET.ParseError as exc:
                  print(f"::warning file={escape(path)}::Could not parse test result XML: {escape(exc)}")
                  continue
              for case in root.findall("testcase"):
                  classname = case.attrib.get("classname", "unknown")
                  name = case.attrib.get("name", "unknown")
                  for node in list(case.findall("failure")) + list(case.findall("error")):
                      found = True
                      message = node.attrib.get("message") or (node.text or "").strip() or "Test failed"
                      title = f"{classname}.{name}"
                      print(f"::error file={escape(path)},title={escape(title)}::{escape(message)}")
          if not found:
              print("No JUnit XML failures found under build/test-results.")
          PY

name: Talos release staging

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: "Exact candidate commit SHA to stage"
        required: true
        type: string
      version:
        description: "Expected talosVersion, for example 0.10.8"
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-staging-${{ github.workflow }}-${{ inputs.target_sha }}
  cancel-in-progress: false

jobs:
  windows-qa-staging:
    name: Windows QA staging artifacts
    runs-on: windows-2025-vs2026
    timeout-minutes: 90

    steps:
      - name: Checkout requested candidate
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target_sha }}
          fetch-depth: 0

      - name: Verify requested commit and version
        shell: pwsh
        run: |
          $actualSha = (git rev-parse HEAD).Trim()
          if ($actualSha -ne "${{ inputs.target_sha }}") {
            throw "Checked out SHA $actualSha does not match requested SHA ${{ inputs.target_sha }}"
          }

          $versionLine = (Select-String -Path gradle.properties -Pattern '^talosVersion=').Line
          if ($versionLine -ne "talosVersion=${{ inputs.version }}") {
            throw "gradle.properties has '$versionLine', expected talosVersion=${{ inputs.version }}"
          }

          $changelogHeading = "## [${{ inputs.version }}]"
          if (-not (Select-String -Path CHANGELOG.md -SimpleMatch $changelogHeading -Quiet)) {
            throw "CHANGELOG.md does not contain $changelogHeading"
          }

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install WiX for jpackage MSI staging
        shell: pwsh
        run: choco install wixtoolset --no-progress --yes

      - name: Run site honesty and build checks
        shell: pwsh
        run: |
          npm ci --prefix site
          npm test --prefix site
          npm run build --prefix site
          npm run test:deploy-surface --prefix site

      - name: Run T929 automated candidate gate
        shell: pwsh
        run: |
          $dirty = git status --short
          if ($dirty) {
            $dirty
            throw "Working tree is dirty before release staging"
          }
          git diff --check
          ./gradlew.bat clean check --no-daemon
          ./gradlew.bat wikiEvidenceCloseGate --rerun-tasks --no-daemon
          ./gradlew.bat talosQualitySummaries --no-daemon

      - name: Build Windows staging artifacts
        shell: pwsh
        run: ./gradlew.bat windowsReleaseArtifacts --no-daemon

      - name: Write staging manifest
        shell: pwsh
        run: |
          $manifest = [ordered]@{
            schema = "talos.releaseStagingManifest.v1"
            releaseStatus = "qa-staging-not-a-release"
            sha = "${{ inputs.target_sha }}"
            version = "${{ inputs.version }}"
            runId = "${{ github.run_id }}"
            runAttempt = "${{ github.run_attempt }}"
            artifactDirectory = "build/release/windows"
            publicReleaseAssetsCreated = $false
            t929Boundary = "GitHub Release, draft release, signed, tagged, winget-linked, and release-named artifacts remain blocked until QA passes."
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content -Path build/release/windows/staging-manifest.json -Encoding UTF8

      - name: Attest Windows QA staging files
        uses: actions/attest@v4
        with:
          subject-path: |
            build/release/windows/*

      - name: Attest Windows SBOM
        uses: actions/attest@v4
        with:
          subject-path: |
            build/release/windows/Talos-${{ inputs.version }}-windows-x64.msi
            build/release/windows/talos-${{ inputs.version }}-windows-x64-app.zip
          sbom-path: build/release/windows/talos-${{ inputs.version }}-sbom.cdx.json

      - name: Upload Windows QA staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: qa-staging-talos-${{ inputs.version }}-windows-x64
          path: build/release/windows/
          if-no-files-found: error
          retention-days: 14

  linux-qa-staging:
    name: Linux QA staging artifacts
    runs-on: ubuntu-latest
    needs: windows-qa-staging
    timeout-minutes: 45

    steps:
      - name: Checkout requested candidate
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target_sha }}
          fetch-depth: 0

      - name: Verify requested commit and version
        shell: bash
        run: |
          actual_sha="$(git rev-parse HEAD)"
          if [[ "$actual_sha" != "${{ inputs.target_sha }}" ]]; then
            echo "Checked out SHA $actual_sha does not match requested SHA ${{ inputs.target_sha }}"
            exit 1
          fi

          version_line="$(grep -E '^talosVersion=' gradle.properties)"
          if [[ "$version_line" != "talosVersion=${{ inputs.version }}" ]]; then
            echo "gradle.properties has '$version_line', expected talosVersion=${{ inputs.version }}"
            exit 1
          fi

          changelog_heading="## [${{ inputs.version }}]"
          if ! grep -Fq "$changelog_heading" CHANGELOG.md; then
            echo "CHANGELOG.md does not contain $changelog_heading"
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Build Linux staging artifacts
        shell: bash
        run: |
          dirty="$(git status --short)"
          if [[ -n "$dirty" ]]; then
            printf '%s\n' "$dirty"
            echo "Working tree is dirty before Linux release staging"
            exit 1
          fi
          git diff --check
          chmod +x ./gradlew
          ./gradlew linuxReleaseArtifacts --no-daemon

      - name: Write Linux staging manifest
        shell: bash
        run: |
          cat > build/release/linux/staging-manifest.json << EOF
          {
            "schema": "talos.releaseStagingManifest.v1",
            "releaseStatus": "qa-staging-not-a-release",
            "sha": "${{ inputs.target_sha }}",
            "version": "${{ inputs.version }}",
            "runId": "${{ github.run_id }}",
            "runAttempt": "${{ github.run_attempt }}",
            "artifactDirectory": "build/release/linux",
            "publicReleaseAssetsCreated": false,
            "t929Boundary": "GitHub Release, draft release, signed, tagged, winget-linked, and release-named artifacts remain blocked until QA passes."
          }
          EOF

      - name: Attest Linux QA staging files
        uses: actions/attest@v4
        with:
          subject-path: |
            build/release/linux/*

      - name: Attest Linux SBOM
        uses: actions/attest@v4
        with:
          subject-path: |
            build/release/linux/talos-${{ inputs.version }}-linux-x64-app.tar.gz
          sbom-path: build/release/linux/talos-${{ inputs.version }}-sbom.cdx.json

      - name: Upload Linux QA staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: qa-staging-talos-${{ inputs.version }}-linux-x64
          path: build/release/linux/
          if-no-files-found: error
          retention-days: 14

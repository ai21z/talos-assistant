# src/main/resources/config/default-config.yaml

rag:
  includes:
    - "**/*.md"
    - "**/*.markdown"
    - "**/*.txt"
    - "**/*.java"
    - "**/*.kt"
    - "**/*.kts"
    - "**/*.gradle"
    - "**/*.xml"
    - "**/*.yml"
    - "**/*.yaml"
    - "**/*.json"
    - "**/*.properties"
    - "**/*.html"
    - "**/*.htm"
  excludes:
    - "**/.git/**"
    - "**/.idea/**"
    - "**/build/**"
    - "**/out/**"
    - "**/target/**"
    - "**/*.class"
    - "**/*.jar"
    - "**/*.zip"
    - "**/*.tar"
    - "**/*.gz"
    - "**/*.png"
    - "**/*.jpg"
    - "**/*.jpeg"
    - "**/*.gif"
    - "**/*.pdf"
    - "**/*.exe"
    - "**/*.dll"
    - "**/*.so"
  top_k: 6
  vectors:
    enabled: false

ollama:
  host: "http://localhost:11434"
  model: "qwen3:8b"

net:
  enabled: false

limits:
  top_k_max: 100
  response_max_chars: 10485760   # 10 MiB
  dir_depth_max: 10
  file_bytes_max: 20000
  file_lines_max: 500
  dir_entries_max: 1000
  llm_timeout_ms: 300000         # 5 minutes
  file_timeout_ms: 10000         # 10 seconds
  rate_per_sec: 10

# src/main/resources/config/default-config.yaml

rag:
  includes:
    - "**/*.md"
    - "**/*.markdown"
    - "**/*.txt"
    - "**/*.java"
    - "**/*.kt"
    - "**/*.kts"
    - "**/*.gradle"
    - "**/*.xml"
    - "**/*.yml"
    - "**/*.yaml"
    - "**/*.json"
    - "**/*.properties"
    - "**/*.html"
    - "**/*.htm"
    - "**/*.js"
    - "**/*.ts"
    - "**/*.jsx"
    - "**/*.tsx"
    - "**/*.css"
    - "**/*.scss"
    - "**/*.sass"
    - "**/*.php"
    - "**/*.py"
    - "**/*.rb"
    - "**/*.go"
    - "**/*.rs"
    - "**/*.cpp"
    - "**/*.c"
    - "**/*.h"
    - "**/*.hpp"
    - "**/*.cs"
    - "**/*.sql"
    - "**/*.sh"
    - "**/*.bat"
    - "**/*.ps1"
    - "**/*.dockerfile"
    - "**/*Dockerfile*"
    - "**/README*"
    - "**/LICENSE*"
    - "**/*.ini"
    - "**/*.conf"
    - "**/*.config"
    - "**/*.toml"
    - "**/*.env"
  excludes:
    - "**/.git/**"
    - "**/.idea/**"
    - "**/.vscode/**"
    - "**/.claude/**"
    - "**/.gradle/**"
    - "**/.mvn/**"
    - "**/node_modules/**"
    - "**/build/**"
    - "**/out/**"
    - "**/target/**"
    - "**/dist/**"
    - "**/*.class"
    - "**/*.jar"
    - "**/*.zip"
    - "**/*.tar"
    - "**/*.gz"
    - "**/*.png"
    - "**/*.jpg"
    - "**/*.jpeg"
    - "**/*.gif"
    - "**/*.pdf"
    - "**/*.exe"
    - "**/*.dll"
    - "**/*.so"
  top_k: 6
  chunk_chars: 1200
  chunk_overlap: 150
  embed_concurrency: 4  # Control concurrent embedding requests
  force_full_reindex: false  # Set to true to ignore file hashes and rebuild everything
  vectors:
    enabled: true

llm:
  transport: "engine"
  default_backend: "ollama"

ollama:
  host: "http://127.0.0.1:11434"
  model: "qwen3:8b"
  embed: "bge-m3"
  allow_remote: false  # Set to true to allow non-localhost Ollama hosts

net:
  enabled: true

limits:
  top_k_max: 100
  response_max_chars: 10485760   # 10 MiB
  dir_depth_max: 10
  file_bytes_max: 200000         # 200 KB for realistic docs
  file_lines_max: 8000           # 8000 lines
  dir_entries_max: 1000
  llm_timeout_ms: 300000         # 5 minutes
  file_timeout_ms: 10000         # 10 seconds
  rate_per_sec: 10
  llm_context_max_tokens: 8192   # Default token budget for prompt validation (fallback if model info unavailable)

ui:
  show_status_during_answer: true
  show_timing_after_answer: true
  show_breakdown: false
  status_label: "Answering…"

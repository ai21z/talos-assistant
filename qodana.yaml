version: "1.0"

# Public repository default: free, local, community-compatible analysis.
# The Gradle quality tasks use the same community linter so contributors do
# not need private tokens for the normal loop.
profile:
  name: qodana.starter

# Qodana inspects JVM source/config. Generated output, local scratch space,
# previous Qodana output, and the website are handled by separate checks.
exclude:
  - name: All
    paths:
      - build
      - .qodana
      - local
      - .gradle
      - reports
      - site
  - name: RegExpUnnecessaryNonCapturingGroup
    paths:
      - src/main/java/dev/talos/runtime/MutationIntent.java
  - name: AutoCloseableResource

# Qodana runs are optional local quality checks, not part of the hard Gradle
# check. Critical findings fail the Qodana command immediately.
failureConditions:
  severityThresholds:
    critical: 0

projectJDK: "21"

linter: jetbrains/qodana-jvm-community:2026.1

include:
  - name: SizeReplaceableByIsEmpty
  - name: JavaExistingMethodCanBeUsed
  - name: FieldCanBeLocal
  - name: ExtractMethodRecommender
  - name: TrivialIf
  - name: RegExpRedundantEscape
  - name: UnnecessaryLocalVariable
  - name: RedundantCast
  - name: RegExpSimplifiable
  - name: SimplifyStreamApiCallChains
  - name: UNUSED_IMPORT
  - name: ConditionCoveredByFurtherCondition
  - name: DuplicateBranchesInSwitch
  - name: DuplicateExpressions
